name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Backend: Lint ───────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.2.0

      - name: Lint backend
        working-directory: backend
        run: |
          flake8 app/ --max-line-length=120 --exclude=__pycache__,migrations \
            --ignore=E501,W503,E302,E303,W291,W293,E301

  # ── 2. Backend: Test ───────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key-32chars!!' }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'ci-jwt-secret-key-32chars!!!' }}
          GEMINI_API_KEY: dummy-key-for-tests
        run: python -m pytest tests/ -v --tb=short

  # ── 3. Frontend: Build ─────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --prefer-offline

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'http://localhost:5000' }}
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build
          retention-days: 7

  # ── 4. Deploy (sadece main/master'a merge sonrası) ─────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy backend to Render
        env:
          HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s --fail "$HOOK" -X POST -d ''
            echo "Backend deploy triggered."
          else
            echo "RENDER_BACKEND_DEPLOY_HOOK secret henüz ayarlanmamış, atlanıyor."
          fi

      - name: Deploy frontend to Render
        env:
          HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s --fail "$HOOK" -X POST -d ''
            echo "Frontend deploy triggered."
          else
            echo "RENDER_FRONTEND_DEPLOY_HOOK secret henüz ayarlanmamış, atlanıyor."
          fi
