services:
  # ── Backend (Flask + Gunicorn) ──────────────────────────────────────────────
  - type: web
    name: seyahat-oneri-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false          # Render dashboard'dan girilecek
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: seyahat-db
          property: connectionString

  # ── Frontend (React static site) ───────────────────────────────────────────
  - type: web
    name: seyahat-oneri-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Backend URL'i Render dashboard'dan girilecek
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Veritabanı ───────────────────────────────────────────────────
databases:
  - name: seyahat-db
    databaseName: seyahat
    user: seyahat
    plan: free
