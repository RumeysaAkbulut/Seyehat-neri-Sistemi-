services:
  # ── Backend (Flask + Gunicorn) ──────────────────────────────────────────────
  - type: web
    name: seyahat-oneri-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:app --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false          # Neon PostgreSQL baglanti URL'si buraya girilecek
      - key: FRONTEND_URL
        sync: false          # React frontend URL'si (CORS icin)

  # ── Frontend (React static site) ───────────────────────────────────────────
  - type: web
    name: seyahat-oneri-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Backend URL'si (orn. https://seyahat-oneri-backend.onrender.com)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
